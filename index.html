<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Радар v7</title>
    <style>
        body {
            margin: 0; /* Убираем отступы по умолчанию */
            display: flex; /* Используем flexbox для размещения элементов */
            flex-direction: column; /* Устанавливаем вертикальное направление для body */
            align-items: center; /* Центрируем содержимое по горизонтали */
            min-height: 100vh; /* Устанавливаем минимальную высоту на 100% высоты окна */
            background: #808080; /* Устанавливаем серый фон */
            font-family: Arial, sans-serif;
            position: relative;
            overflow: hidden;
        }
        #controls {
            display: flex; /* Используем flexbox для размещения кнопок в одной строке */
            justify-content: center; /* Центрируем кнопки по горизонтали */
            margin: 0;
            width: auto;
            flex-wrap: wrap;
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8;
        }
        #scaleButton {
            color: #00ff00;
        }
        #startButton,
        #stopButton {
            color: #00ff00;
        }
        button {
            padding: 8px 16px; /* Устанавливаем внутренние отступы для кнопок */
            font-size: 16px; /* Устанавливаем размер шрифта для кнопок */
            cursor: pointer; /* Изменяем курсор на указатель при наведении */
            background: #333; /* Устанавливаем цвет фона кнопок */
            color: white; /* Устанавливаем цвет текста кнопок */
            border: none; /* Убираем рамку у кнопок */
            border-radius: 4px; /* Устанавливаем скругление углов кнопок */
            margin: 5px; /* Устанавливаем отступ между кнопками */
            transition: opacity 0.9s ease; /* Добавляем плавный переход для изменения прозрачности */
        }
        button:disabled {
            cursor: not-allowed;
        }
        #c300Button {
            padding: 0;
            background: transparent;
        }
        .enemyButton {
            padding: 0;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            color: #ffffff;
            min-width: 120px;
        }
        .enemyButton img {
            display: block;
            width: 100px;
            height: 50px;
            object-fit: contain;
        }
        .enemyButton .enemyLabel {
            font-size: 12px;
            line-height: 1.1;
            margin-top: 2px;
            text-align: center;
            white-space: nowrap;
            color: #00ff00;
        }
        #c300Button img {
            display: block;
            width: 100px;
            height: 50px;
            object-fit: contain;
        }
        #c400Button {
            padding: 0;
            background: transparent;
        }
        #c400Button img {
            display: block;
            width: 100px;
            height: 50px;
            object-fit: contain;
        }
        #gunButton {
            padding: 0;
            background: transparent;
        }
        #gunButton img {
            display: block;
            width: 100px;
            height: 50px;
            object-fit: contain;
        }
        #afarButton {
            padding: 0;
            background: transparent;
        }
        #afarButton img {
            display: block;
            /* Увеличение спрайта AFAR на ~30% относительно C300/C400 */
            width: 100px;
            height: 70px;
            object-fit: contain;
        }
        canvas {
            display: block; /* Отображаем canvas как блочный элемент */
            background-color: #000; /* Устанавливаем черный цвет фона для радара */
        }
        #coordsDisplay {
            position: absolute; /* Устанавливаем абсолютное позиционирование для отображения координат */
            top: 100px; /* Устанавливаем отступ сверху ниже кнопок управления */
            left: 20px; /* Устанавливаем отступ слева */
            color: rgb(10, 253, 2); /* Устанавливаем цвет текста */
            background: rgba(0, 0, 0, 0.7); /* Устанавливаем полупрозрачный черный фон */
            padding: 10px; /* Устанавливаем внутренние отступы */
            border-radius: 5px; /* Устанавливаем скругление углов */
            font-family: Arial, sans-serif; /* Устанавливаем шрифт для текста */
            font-size: 14px; /* Устанавливаем размер шрифта для текста */
            display: none; /* Скрываем поле координат */
        }
        #ammoPanel {
            position: absolute;
            top: 110px;
            right: 10px;
            z-index: 7;
            margin-bottom: 8px;
            border-collapse: collapse;
            color: rgb(43, 255, 0);
            background: rgba(0, 0, 0, 0.35);
        }
        #debugTable {
            position: absolute;
            top: 110px;
            left: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: #00ff00;
            padding: 10px;
            font-family: monospace;
            border: 1px solid #00ff00;
            display: block;
            z-index: 7;
        }
        #killStats {
            margin-bottom: 10px;
            font-size: 1em;
            color: #00ff00;
            min-width: 100px;
        }
        .killStatRow {
            display: flex;
            align-items: baseline;
            gap: 6px;
            margin: 2px 0;
            white-space: nowrap;
        }
        .killStatLabel {
            color: #00ff00;
        }
        .killStatDots {
            flex: 1;
            border-bottom: 1px dotted #00ff00;
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .killStatValue {
            min-width: 18px;
            text-align: right;
            color: #00ff00;
        }
    </style>
</head>
<body>
    <div id="controls">
        <button id="scaleButton">400 km</button>
        <button id="startButton">Start</button>
        <button id="stopButton">X1</button>
        <button id="type11Button" class="enemyButton" type="button" aria-label="Type 11">
            <img src="Missile_balistic.png" alt="Type 11" />
            <span class="enemyLabel">Balistic missile</span>
        </button>
        <button id="type12Button" class="enemyButton" type="button" aria-label="Type 12">
            <img src="cruise-missile2.png" alt="Type 12" />
            <span class="enemyLabel">Cruise missile</span>
        </button>
        <button id="type21Button" class="enemyButton" type="button" aria-label="Type 21">
            <img src="B1-B.png" alt="Type 21" />
            <span class="enemyLabel">Bomber</span>
        </button>
        <button id="type22Button" class="enemyButton" type="button" aria-label="Type 22">
            <img src="B2.png" alt="Type 22" />
            <span class="enemyLabel">Stels bomber</span>
        </button>
        <button id="type23Button" class="enemyButton" type="button" aria-label="Type 23">
            <img src="F15.png" alt="Type 23" />
            <span class="enemyLabel">Front-line bomber</span>
        </button>
    </div>
    <table id="ammoPanel">
        <tbody>
            <tr>
                <td style="padding: 6px 10px;">Balance: <span id="currencyDisplay">100000</span></td>
            </tr>
            <tr>
                <td style="padding: 6px 10px;">
                    <button id="c300Button" type="button" aria-label="C300">
                        <img id="c300ButtonImg" src="C300_deactiv.png" alt="C300" />
                    </button>
                    <button id="c300PlusButton">+</button>
                    <span id="c300CountDisplay">C300: 0</span>
                </td>
            </tr>
            <tr>
                <td style="padding: 6px 10px;">
                    <button id="c400Button" type="button" aria-label="C400">
                        <img id="c400ButtonImg" src="C400_deactiv.png" alt="C400" />
                    </button>
                    <button id="c400PlusButton">+</button>
                    <span id="c400CountDisplay">C400: 0</span>
                </td>
            </tr>
            <tr>
                <td style="padding: 6px 10px;">
                    <button id="gunButton" type="button" aria-label="Gun">
                        <img id="gunButtonImg" src="Gun_deactiv.png" alt="Gun" />
                    </button>
                    <button id="gunPlusButton">+</button>
                    <span id="gunCountDisplay">Gun: 0</span>
                </td>
            </tr>
            <tr>
                <td style="padding: 6px 10px;">
                    <button id="afarButton" type="button" aria-label="AFAR">
                        <img id="afarButtonImg" src="AFAR_deactiv.png" alt="AFAR" />
                    </button>
                    <span id="afarStateDisplay" style="margin-left: 10px;">AFAR: OFF</span>
                </td>
            </tr>
        </tbody>
    </table>
    <canvas id="radarCanvas"></canvas>
    <div id="coordsDisplay">Координаты: (r: 0, φ: 0°)</div>

    <!-- Обновляем отладочное окно -->
    <div id="debugTable">
        <h3 style="margin: 0 0 10px 0; color: #00ff00;">Targets</h3>
        <!-- Добавляем поле для счета -->
        <div id="scoreDisplay" style="margin-bottom: 10px; font-size: 1.2em; color: #FFD700;">
            Score: 0
        </div>
        <!-- Добавляем поле для счетчика попаданий -->
        <div id="hitsDisplay" style="margin-bottom: 10px; font-size: 1.2em; color: #FF5555;">
            Hits: 1
        </div>
        <!-- Добавляем поле для статистики сбитых целей -->
        <div id="killStats">
            <div class="killStatRow"><span class="killStatLabel">Balistic m.:</span><span class="killStatDots"></span><span id="stat11" class="killStatValue">0</span></div>
            <div class="killStatRow"><span class="killStatLabel">Smart bomb:</span><span class="killStatDots"></span><span id="stat13" class="killStatValue">0</span></div>
            <div class="killStatRow"><span class="killStatLabel">Cruise m.:</span><span class="killStatDots"></span><span id="stat12" class="killStatValue">0</span></div>
            <div class="killStatRow"><span class="killStatLabel">Bomber:</span><span class="killStatDots"></span><span id="stat21" class="killStatValue">0</span></div>
            <div class="killStatRow"><span class="killStatLabel">Stels b.:</span><span class="killStatDots"></span><span id="stat22" class="killStatValue">0</span></div>
            <div class="killStatRow"><span class="killStatLabel">Front-line b.:</span><span class="killStatDots"></span><span id="stat23" class="killStatValue">0</span></div>
        </div>
        <!-- Добавляем поле для времени -->
        <div id="gameTimer" style="margin-bottom: 10px; font-size: 1.2em;">
            Time: 0.0 sec
        </div>
        <table id="targetTable" style="border-collapse: collapse;">
            <thead>
                <tr>
                    <th style="border: 1px solid #00ff00; padding: 5px;">ID</th>
                    <th style="border: 1px solid #00ff00; padding: 5px;">Type</th>
                    <th style="border: 1px solid #00ff00; padding: 5px;">r</th>
                    <th style="border: 1px solid #00ff00; padding: 5px;">φ°</th>
                    <th style="border: 1px solid #00ff00; padding: 5px;">Speed</th>
                </tr>
            </thead>
            <tbody id="targetTableBody">
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>

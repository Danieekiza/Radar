<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Launcher</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        #disclaimerScreen {
            opacity: 0;
            animation: disclaimerFadeIn 1s ease forwards;
            z-index: 10;
        }

        #disclaimerScreen img {
            max-width: min(90vw, 1000px);
            max-height: 90vh;
            object-fit: contain;
        }

        #menuScreen {
            z-index: 5;
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .menu-button {
            min-width: 220px;
            padding: 14px 24px;
            border: 1px solid #00ff66;
            border-radius: 8px;
            background: #111;
            color: #00ff66;
            font-size: 20px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .menu-button:hover {
            background: #1b1b1b;
        }

        @keyframes disclaimerFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="disclaimerScreen" class="screen" aria-hidden="true">
        <img src="disclaimer.png" alt="Disclaimer">
    </div>

    <div id="menuScreen" class="screen">
        <button id="tutorialButton" class="menu-button" type="button">TUTORIAL</button>
        <button id="sandboxButton" class="menu-button" type="button">SANDBOX</button>
        <button id="gameButton" class="menu-button" type="button">GAME</button>
    </div>

    <script>
        (function () {
            const disclaimerScreen = document.getElementById('disclaimerScreen');
            const menuScreen = document.getElementById('menuScreen');
            const sandboxButton = document.getElementById('sandboxButton');

            // 1с fade-in + 2с показ
            setTimeout(function () {
                disclaimerScreen.style.display = 'none';
                menuScreen.style.display = 'flex';
            }, 3000);

            sandboxButton.addEventListener('click', function () {
                window.location.href = 'index.html';
            });
        })();
    </script>
</body>
</html>
